# Environment name
name: deep-learning-hands-on-2

# Channels to search for packages
channels:
  - pytorch       # Main channel for PyTorch and related libraries
  # - nvidia      # NVIDIA channel for CUDA and GPU dependencies. Enable if CUDA is available
  - conda-forge   # Community maintained packages

# Dependencies to install in the environment
dependencies:
  - python=3.10          # Specify Python version
  - pytorch=2.0.1        # PyTorch for deep learning tasks
  - torchvision=0.15.2   # Vision library that complements PyTorch
  # - pytorch-cuda=11.8  # CUDA toolkit for GPU acceleration. Enable if CUDA is available
  - matplotlib=3.6.2     # Plotting library for creating graphs and figures
  - numpy=1.23.5         # Numpy for numerical computations
  - Pillow=9.4.0         # Python Imaging Library for image processing
  - tqdm=4.64.1          # Progress bar library for Python
  - wandb=0.19.11        # Weights and Biases for experiment tracking
